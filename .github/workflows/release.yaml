name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Path-prefixed Git tags so external consumers (e.g. the Initializ
  # platform) can `go get github.com/initializ/forge/forge-{skills,core,
  # plugins}@<version>`. See scripts/release/tag-libraries.sh and
  # docs/contributing/release-process.md for the rationale + mechanism.
  library-tags:
    name: Library module tags
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # checkout@v4 fetches with a token that only has read access by
          # default for tag pushes; the workflow's `permissions:
          # contents: write` block above gives the implicit
          # GITHUB_TOKEN write scope, but the checkout step still needs
          # to be configured to use it for `git push`.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Tag library modules
        run: ./scripts/release/tag-libraries.sh "${GITHUB_REF_NAME}"
        env:
          # The script runs `git push`; ensure the bot identity is set
          # so the ephemeral release commit has a sensible author.
          GIT_AUTHOR_NAME: forge release bot
          GIT_AUTHOR_EMAIL: release-bot@initializ.ai
          GIT_COMMITTER_NAME: forge release bot
          GIT_COMMITTER_EMAIL: release-bot@initializ.ai

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version info
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
